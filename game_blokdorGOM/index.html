<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background: #000; font-family: Arial, sans-serif; -webkit-user-select: none; user-select: none; width: 100vw; height: 100vh; }
        
        /* Game 3D Full Satu Layar HP */
        #canvas-container { 
            width: 100%; 
            height: 100%; 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 1; 
            touch-action: none; 
        }
        
        /* Lapisan UI Melayang di Atas Game (Minecraft Style) */
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* Klik bisa menembus layar untuk menengok */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px;
        }
        
        /* Bar Atas Tipis */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: auto; /* Tombol atas bisa diklik */
        }
        h2 { color: rgba(255, 255, 255, 0.7); margin: 0; font-size: 14px; text-shadow: 1px 1px 2px black; font-weight: normal; }
        
        /* D-Pad Minecraft PE di Kiri Bawah */
        .dpad { 
            position: absolute; 
            bottom: 20px; 
            left: 20px; 
            display: grid; 
            grid-template-columns: repeat(3, 50px); 
            grid-template-rows: repeat(3, 50px); 
            gap: 4px; 
            pointer-events: auto; /* Tombol arah bisa diklik */
        }
        .dpad button { 
            background: rgba(85, 85, 85, 0.6); 
            border: 2px solid rgba(255,255,255,0.2); 
            border-radius: 8px; 
            padding: 0; 
            font-size: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white;
            box-shadow: none;
        }
        .dpad button:active { background: rgba(120, 120, 120, 0.8); }
        .dpad-center { background: rgba(85, 85, 85, 0.3) !important; pointer-events: none; } /* Bagian tengah dpad kosong */
        
        /* Hotbar Pilihan Balok di Bawah Tengah */
        .hotbar {
            display: flex;
            gap: 8px;
            pointer-events: auto; /* Slot balok bisa diklik */
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.6);
            padding: 6px;
            border-radius: 10px;
            border: 2px solid #555;
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        /* Desain Tombol Hotbar */
        button { 
            padding: 10px 16px; 
            font-size: 13px; 
            font-weight: bold; 
            border: 2px solid #444; 
            border-radius: 6px; 
            cursor: pointer; 
            color: white; 
            text-shadow: 1px 1px 0px black;
            box-shadow: inset 0 -3px 0 rgba(0,0,0,0.3);
            transition: all 0.1s;
        }
        button:active {
            transform: translateY(1px);
            box-shadow: none;
        }
        .btn-wood { background: #d7a15c; color: #3e2723; }
        .btn-engine { background: #ff3333; }
        .btn-neon { background: #3333ff; }
        .btn-clear { background: #f7630c; }
        
        /* Efek Bingkai Putih jika Balok sedang Aktif Terpilih */
        .selected-block {
            border: 2px solid #ffffff !important;
            box-shadow: 0 0 10px #ffffff, inset 0 -3px 0 rgba(0,0,0,0.3);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="ui-overlay">
        <div class="top-bar">
            <button class="btn-clear" onclick="clearGrid()">🗑️ Clear</button>
        </div>
        
        <div class="dpad">
            <div></div>
            <button ontouchstart="movePlayer('forward')" ontouchend="stopPlayer('forward')" onmousedown="movePlayer('forward')" onmouseup="stopPlayer('forward')">▲</button>
            <div></div>
            <button ontouchstart="movePlayer('left')" ontouchend="stopPlayer('left')" onmousedown="movePlayer('left')" onmouseup="stopPlayer('left')">◀</button>
            <div class="dpad-center"></div>
            <button ontouchstart="movePlayer('right')" ontouchend="stopPlayer('right')" onmousedown="movePlayer('right')" onmouseup="stopPlayer('right')">▶</button>
            <div></div>
            <button ontouchstart="movePlayer('backward')" ontouchend="stopPlayer('backward')" onmousedown="movePlayer('backward')" onmouseup="stopPlayer('backward')">▼</button>
            <div></div>
        </div>
        
        <div class="hotbar">
            <button id="btn-wood" class="btn-wood selected-block" onclick="setBlockColor(0xd7a15c, 'btn-wood')">Wood</button>
            <button id="btn-engine" class="btn-engine" onclick="setBlockColor(0xff3333, 'btn-engine')">Engine</button>
            <button id="btn-neon" class="btn-neon" onclick="setBlockColor(0x3333ff, 'btn-neon')">Neon</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
