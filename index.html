<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Blokdor GOM 3D</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: Arial, sans-serif; }
        canvas { display: block; width: 100vw; height: 70vh; }
        .ui-panel { height: 30vh; background: #222; padding: 10px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: space-around; }
        .btn-group { display: flex; gap: 10px; }
        button { padding: 12px 20px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
        .btn-blue { background: #0078d4; color: white; }
        .btn-green { background: #107c41; color: white; }
        .btn-orange { background: #d83b01; color: white; }
        .btn-rotate { background: #555; color: white; }
        h2 { color: white; margin: 0; font-size: 18px; text-align: center; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="ui-panel">
        <h2>Blokdor GOM 3D - Mode Build</h2>
        <div class="btn-group">
            <button class="btn-blue" onclick="setBlockColor(0xd7a15c)">Balok Kayu</button>
            <button class="btn-orange" onclick="setBlockColor(0xff3333)">Balok Mesin</button>
            <button class="btn-green" onclick="setBlockColor(0x3333ff)">Balok Neon</button>
        </div>
        <div class="btn-group">
            <button class="btn-rotate" onclick="rotateCamera()">🔄 Putar Kamera</button>
            <button style="background: #f7630c; color: white;" onclick="clearGrid()">🗑️ Hapus Semua</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
